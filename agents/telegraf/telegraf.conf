# =============================================================================
# Telegraf configuration for 1line Portal
# =============================================================================
# Required environment variables:
#   PORTAL_URL  — https://your-portal.example.com  (no trailing slash)
#   AGENT_ID    — UUID from the portal Register Agent dialog
#   AGENT_KEY   — API key shown once at registration
# =============================================================================

[global_tags]
  # Add any static tags you want on every metric, e.g.:
  # datacenter = "eu-west-1"

[agent]
  interval            = "15s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 10000
  collection_jitter   = "2s"
  flush_interval      = "15s"
  flush_jitter        = "3s"
  precision           = "0s"
  hostname            = ""      # empty = auto-detect from OS
  omit_hostname       = false

# =============================================================================
# INPUTS — System
# =============================================================================

[[inputs.cpu]]
  ## Report CPU usage for all CPUs combined
  percpu           = false
  totalcpu         = true
  collect_cpu_time = false
  report_active    = false
  core_tags        = false

[[inputs.mem]]
  ## Reports: total, available, used, used_percent, free, ...

[[inputs.disk]]
  ## Root partition — used for disk used/total in the portal
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay", "squashfs", "udev", "nsfs"]

[[inputs.system]]
  ## Reports: load1, load5, load15, n_cpus, n_users, uptime, uptime_format

# =============================================================================
# INPUTS — Docker
# =============================================================================

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"

  ## Collect all container states (not just running)
  container_state_include = [
    "created", "restarting", "running", "removing", "paused", "exited", "dead"
  ]

  ## Per-container stats to collect
  total_include  = ["cpu", "blkio", "network"]
  perdevice_include = []

  ## Collect service metrics (docker swarm)
  gather_services = false
  total           = false

  ## Label filters (empty = all containers)
  docker_label_include = []

  timeout = "5s"

# =============================================================================
# INPUTS — Custom exec: pending OS updates (Debian/Ubuntu)
# =============================================================================

[[inputs.exec]]
  name_override = "apt_updates"
  interval      = "1h"          # check for updates once per hour
  timeout       = "60s"
  commands = ["""
    python3 /etc/telegraf/scripts/apt-updates.py
  """]
  data_format = "value"
  data_type   = "string"

# =============================================================================
# INPUTS — Custom exec: failed systemd services
# =============================================================================

[[inputs.exec]]
  name_override = "systemd_failed"
  interval      = "1m"
  timeout       = "10s"
  commands = [
    "bash /etc/telegraf/scripts/failed-services.sh"
  ]
  data_format = "value"
  data_type   = "string"

# =============================================================================
# INPUTS — Custom exec: recent SSH logins
# =============================================================================

[[inputs.exec]]
  name_override = "recent_logins"
  interval      = "5m"
  timeout       = "10s"
  commands = ["""
    python3 /etc/telegraf/scripts/recent-logins.py
  """]
  data_format = "value"
  data_type   = "string"

# =============================================================================
# OUTPUT — 1line Portal
# =============================================================================

[[outputs.http]]
  url              = "${PORTAL_URL}/api/containers/agents/${AGENT_ID}/telegraf"
  method           = "POST"
  data_format      = "json"
  use_batch_format = true
  timeout          = "15s"

  [outputs.http.headers]
    Content-Type = "application/json"
    X-Agent-Key  = "${AGENT_KEY}"
