services:

  # ── Telegraf: collects system + Docker metrics, pushes to portal ─────────────
  telegraf:
    build: .
    restart: unless-stopped
    user: "telegraf:${DOCKER_GID:-999}"
    privileged: true
    pid: "host"
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    hostname: "${HOSTNAME:-}"
    environment:
      PORTAL_URL: "${PORTAL_URL}"
      AGENT_ID:   "${AGENT_ID}"
      AGENT_KEY:  "${AGENT_KEY}"
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./scripts:/etc/telegraf/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/hostfs:ro

  # ── Command handler: polls portal for start/stop/restart commands ─────────────
  cmd-handler:
    image: python:3.12-alpine
    restart: unless-stopped
    user: root
    environment:
      PORTAL_URL:    "${PORTAL_URL}"
      AGENT_ID:      "${AGENT_ID}"
      AGENT_KEY:     "${AGENT_KEY}"
      POLL_INTERVAL: "5"
    volumes:
      - ./command-handler.py:/app/command-handler.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "apk add --no-cache docker-cli --quiet && pip install requests --quiet && python3 command-handler.py"